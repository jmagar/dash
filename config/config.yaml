# Python settings
python:
  path: /app
  unbuffered: 1
  debug: true
  environment: development

# Gunicorn settings
gunicorn:
  bind: 0.0.0.0:5000
  worker_class: geventwebsocket.gunicorn.workers.GeventWebSocketWorker
  workers: 3
  reload: true
  reload_extra_files:
    - templates/
    - static/
    - server/
  log_level: debug
  timeout: 120
  capture_output: true
  enable_stdio_inheritance: true

# Server settings
server:
  host: 0.0.0.0
  port: 5000
  debug: true

# Logging settings
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - stdout

# Directory paths
directories:
  compose: /mnt/user/compose
  proxy: /mnt/user/appdata/swag/nginx/proxy-confs
  logs: /app/logs
  config: /app/config

# Python settings
python:
  debug: true
  environment: development

# Gunicorn settings
gunicorn:
  bind: 0.0.0.0:5000
  worker_class: geventwebsocket.gunicorn.workers.GeventWebSocketWorker
  workers: 3
  reload: true
  reload_extra_files:
    - templates/
    - static/
    - server/
  log_level: debug
  timeout: 120
  capture_output: true
  enable_stdio_inheritance: true

# Server settings
server:
  host: 0.0.0.0
  port: 5000
  debug: true
  environment: development

# Logging settings
log_level: DEBUG
log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Docker settings
docker_socket: /var/run/docker.sock

# Notification settings
# gotify_url: https://gotify.example.com
# gotify_token: abcdef12345
# gotify_priority: 5
# gotify_retry: 60
# gotify_expire: 3600

# Backup settings
# github_username: your-github-username
# github_token: ghp_123abc456def
# github_repo: your-username/your-repo
# github_branch: main
# github_path: /backup
# github_interval: 3600  # backup interval in seconds

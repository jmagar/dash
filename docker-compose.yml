name: dash

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-dashboard
    ports:
      - "5932:5000"  # HTTP port
    volumes:
      - ${COMPOSE_DIR:-/mnt/user/compose}:/mnt/user/compose:ro
      - ${PROXY_DIR:-/mnt/user/appdata/swag/nginx/proxy-confs}:/mnt/user/appdata/swag/nginx/proxy-confs:ro
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - COMPOSE_DIR=/mnt/user/compose
      - PROXY_DIR=/mnt/user/appdata/swag/nginx/proxy-confs
      - GOTIFY_URL=${GOTIFY_URL:-}
      - GOTIFY_TOKEN=${GOTIFY_TOKEN:-}
      - GUNICORN_CMD_ARGS=--bind=0.0.0.0:5000 --worker-class=geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers=3 --log-level=debug --timeout=120 --reload --capture-output --enable-stdio-inheritance
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/servers/suggested"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-watcher
    command: python watcher.py
    volumes:
      - ${COMPOSE_DIR:-/mnt/user/compose}:/mnt/user/compose:ro
      - ${PROXY_DIR:-/mnt/user/appdata/swag/nginx/proxy-confs}:/mnt/user/appdata/swag/nginx/proxy-confs:ro
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - COMPOSE_DIR=/mnt/user/compose
      - PROXY_DIR=/mnt/user/appdata/swag/nginx/proxy-confs
      - GOTIFY_URL=${GOTIFY_URL:-}
      - GOTIFY_TOKEN=${GOTIFY_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - dashboard
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

<!-- Compose Viewer Modal -->
<div id="compose-modal" class="modal hidden">
    <div class="modal-content max-w-4xl">
        <div class="modal-header">
            <h3 class="text-xl font-semibold" id="compose-modal-title"></h3>
            <button onclick="dockerDashboard.compose.closeComposeModal()" class="modal-close">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="modal-body">
            <div class="compose-viewer bg-gray-900 rounded-lg p-4">
                <pre><code class="language-yaml" id="compose-content"></code></pre>
            </div>
        </div>
    </div>
</div>

<!-- Terminal Modal -->
<div id="terminal-modal" class="modal hidden">
    <div class="modal-content max-w-4xl">
        <div class="modal-header">
            <h3 class="text-xl font-semibold" id="terminal-modal-title"></h3>
            <div class="flex items-center space-x-2">
                <button onclick="dockerDashboard.terminal.toggleFullscreen()" class="modal-button">
                    <span class="material-icons">fullscreen</span>
                </button>
                <button onclick="dockerDashboard.terminal.closeTerminal()" class="modal-close">
                    <span class="material-icons">close</span>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div id="terminal-container" class="terminal-container"></div>
        </div>
    </div>
</div>

<!-- Logs Modal -->
<div id="logs-modal" class="modal hidden">
    <div class="modal-content max-w-4xl">
        <div class="modal-header">
            <h3 class="text-xl font-semibold" id="logs-modal-title"></h3>
            <button onclick="dockerDashboard.logs.closeLogs()" class="modal-close">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="modal-body">
            <div id="logs-container" class="logs-container"></div>
        </div>
    </div>
</div>
